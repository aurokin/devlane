schema: 1
app: warcraft
kind: cli

lane:
  stable_name: stable
  stable_branches: [main, master]
  project_pattern: "{app}_{lane}"
  path_roots:
    state: ".devlane/state"
    cache: ".devlane/cache"
    runtime: ".warcraft/runtime"

  # host_patterns is optional. Uncomment if you have a proxy or DNS
  # resolving these hostnames.
  # host_patterns:
  #   stable: "warcraft.localhost"
  #   dev: "{lane}.warcraft.localhost"

runtime:
  compose_files:
    - compose.yaml
  default_profiles: []
  optional_profiles: [redis]
  env:
    WARCRAFT_ALLOW_LINK_BIN: "0"

outputs:
  manifest_path: ".devlane/manifest.json"
  compose_env_path: ".devlane/compose.env"
  generated:
    - template: "templates/worktree-env.sh.tmpl"
      destination: ".warcraft/worktree-env.sh"
