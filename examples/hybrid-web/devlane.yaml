schema: 1
app: hybridweb
kind: hybrid

lane:
  stable_name: stable
  stable_branches: [main, master]
  project_pattern: "{app}_{lane}"
  path_roots:
    state: ".devlane/state"
    cache: ".devlane/cache"
    runtime: ".devlane/runtime"

  # host_patterns is optional. Uncomment if you have a proxy or DNS
  # resolving these hostnames (Caddy, Traefik, /etc/hosts, etc.).
  # host_patterns:
  #   stable: "{app}.localhost"
  #   dev: "{lane}.{app}.localhost"

runtime:
  # Supervised substrate: Redis sidecar runs under compose.
  compose_files:
    - compose.yaml
  default_profiles: [cache]
  env:
    RAILS_ENV: development

  # Unsupervised commands: the web server runs bare-metal on the host so the
  # developer can attach a debugger. `devlane up` will print these; it will
  # never spawn them. See docs/75-baremetal-workflow.md.
  run:
    commands:
      - name: web
        description: "Start the Rails server (bare-metal)"
        command: "bin/rails server -p {{ports.web}}"
      - name: worker
        description: "Start the background worker (bare-metal)"
        command: "REDIS_URL=redis://localhost:{{ports.redis}}/0 bin/sidekiq"

ports:
  # Bare-metal service: the catalog picks a port; the web command renders it.
  - name: web
    default: 3000
    health_path: /up
    pool_hint: [3100, 3199]

  # Compose-managed sidecar: published on the host so bare-metal processes can
  # reach it. The catalog coordinates this with every other devlane repo.
  - name: redis
    default: 6379
    pool_hint: [6380, 6399]

worktree:
  # Files copied from the source checkout when `devlane worktree create` runs.
  # No defaults — every entry is explicit. Paths that also appear in
  # outputs.generated below are skipped (prepare will render them).
  seed:
    - .env.secrets
    - config/master.key

outputs:
  manifest_path: ".devlane/manifest.json"
  compose_env_path: ".devlane/compose.env"
  generated:
    - template: "templates/web.env.tmpl"
      destination: ".env.local"
